<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulazione INVALSI - Classe 1A</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        #app-container { background: white; width: 100%; max-width: 1000px; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); min-height: 550px; }
        .hidden { display: none !important; }
        .flex-container { display: flex; gap: 30px; margin-top: 20px; }
        #box-brano { flex: 1.2; border-right: 2px solid #eee; padding-right: 20px; font-size: 17px; line-height: 1.6; color: #444; white-space: pre-wrap; height: 450px; overflow-y: auto; }
        #box-quiz { flex: 1; }
        h1 { color: #1a73e8; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; }
        button { background-color: #1a73e8; color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #1557b0; }
        input[type="text"], input[type="password"] { padding: 12px; width: 250px; border: 1px solid #ddd; border-radius: 5px; margin-bottom: 15px; }
        .opzione-item { background: #f8f9fa; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ddd; display: flex; align-items: center; cursor: pointer; }
        .opzione-item:hover { background: #e8f0fe; }
        input[type="radio"] { margin-right: 15px; transform: scale(1.3); }
    </style>
</head>
<body>
<div id="app-container">
    <div id="schermata-login" style="text-align: center; padding-top: 50px;">
        <h1>🔑 Accesso Simulazione</h1>
        <p>Inserisci le tue credenziali</p>
        <input type="text" id="username" placeholder="Nome Utente"><br>
        <input type="password" id="password" placeholder="Password"><br>
        <button onclick="controllaLogin()">ACCEDI</button>
    </div>
    <div id="schermata-lettura" class="hidden">
        <h1>📖 Analisi del Testo</h1>
        <div id="testo-pieno" style="margin: 25px 0; font-size: 19px; line-height: 1.8; text-align: justify;">Caricamento testo...</div>
        <button onclick="iniziaQuiz()">VAI ALLE DOMANDE</button>
    </div>
    <div id="schermata-quiz" class="hidden">
        <h1>Prova Invalsi</h1>
        <div class="flex-container">
            <div id="box-brano"></div>
            <div id="box-quiz">
                <h2 id="numero-domanda" style="color: #555;"></h2>
                <p id="testo-domanda" style="font-size: 18px; font-weight: 600;"></p>
                <div id="lista-opzioni"></div>
                <div id="controlli" style="margin-top: 30px; text-align: right;"></div>
            </div>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
